<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion | RIP</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css?v=20260624-arcade1">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">RIP</a>

    <nav class="nav" aria-label="Navigation principale">
      <a href="index.html">Tchat</a>
      <a href="connexion.html" data-auth-visible="guest">Connexion</a>
      <a href="inscription.html" data-auth-visible="guest">Inscription</a>
      <a href="compte.html" data-auth-visible="user">Mon profil</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-panel" aria-labelledby="login-title">
      <p class="eyebrow">Connexion</p>
      <h1 id="login-title">Retour dans ton espace.</h1>
      <p class="auth-note">
        Connecte-toi avec ton compte Supabase. La session reste enregistree apres fermeture du site.
      </p>

      <form class="auth-form" id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="login-password">Mot de passe</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button class="button primary full" type="submit">Connexion</button>
        <p class="form-message" id="login-message" role="status" aria-live="polite"></p>
      </form>

      <p class="auth-switch">
        Pas encore de compte ?
        <a href="inscription.html">Creer un compte</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <span>RIP</span>
    <span>&copy; <span id="year"></span> Tous droits reserves.</span>
  </footer>

  <script src="supabase-config.js?v=20260624-arcade1"></script>
  <script src="supabase-client.js?v=20260624-arcade1"></script>
  <script src="auth.js?v=20260624-arcade1"></script>
  <script src="script.js?v=20260624-arcade1"></script>
</body>
</html>
