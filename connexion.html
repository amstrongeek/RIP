<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIP #TUFF | Connexion</title>
  <link rel="icon" type="image/png" href="assets/brand/rip-logo.png">
  <link rel="stylesheet" href="style.css?v=20260626-stable-polish1">
</head>
<body>
  <header class="site-header">
    <a class="logo brand-logo" href="index.html">
      <img src="assets/brand/rip-logo.png" alt="" aria-hidden="true">
      <span>RIP #TUFF</span>
    </a>
    <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Ouvrir le menu">Menu</button>

            <nav class="nav" data-main-nav aria-label="Navigation principale">
      <a href="index.html">Accueil</a>
      <a href="chat.html">Tchat</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="arcade.html">Arcade</a>
      <a href="boutique.html">Boutique</a>
      <a href="classements.html">Classements</a>
      <a href="succes.html">Succes</a>
      <a href="connexion.html" data-auth-visible="guest">Connexion</a>
      <a href="compte.html" data-auth-visible="user">Profil</a>
      <a href="admin.html" data-auth-visible="admin" hidden>Admin</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-panel" aria-labelledby="login-title">
      <p class="eyebrow">Connexion</p>
      <h1 id="login-title">Retour dans ton espace.</h1>
      <p class="auth-note">
        Connecte-toi avec ton compte Supabase. La session reste enregistree apres fermeture du site.
      </p>

      <form class="auth-form" id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="login-password">Mot de passe</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button class="button primary full" type="submit">Connexion</button>
        <p class="form-message" id="login-message" role="status" aria-live="polite"></p>
      </form>

      <p class="auth-switch">
        Pas encore de compte ?
        <a href="inscription.html">Creer un compte</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <span>RIP</span>
    <span>&copy; <span id="year"></span> Tous droits reserves.</span>
  </footer>

  <script src="supabase-config.js?v=20260626-stable-polish1"></script>
  <script src="supabase-client.js?v=20260626-stable-polish1"></script>

  <script src="script.js?v=20260626-stable-polish1"></script>
</body>
</html>
