<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Creation gratuite d'un compte RIP Casino.">
  <title>Inscription | RIP Casino</title>
  <link rel="icon" type="image/png" href="../../assets/brand/rip-logo.png">
  <link rel="stylesheet" href="signup.css?v=20260702-clicker1">
</head>
<body>
  <header>
    <a class="brand" href="../home/home.html"><img src="../../assets/brand/rip-logo.png" alt=""><span>RIP CASINO</span></a>
    <a class="discord-link" href="https://discord.gg/9j5Nxuk2sH" target="_blank" rel="noreferrer">Discord</a>
  </header>

  <main>
    <section class="auth-panel" aria-labelledby="signup-title">
      <p class="eyebrow">10 000 points offerts</p>
      <h1 id="signup-title">Compte gratuit</h1>
      <p class="lead">Aucun paiement. Tes points et tes parties restent lies a ton compte.</p>

      <form id="signup-form">
        <label for="signup-pseudo">Pseudo</label>
        <input id="signup-pseudo" name="pseudo" type="text" minlength="3" maxlength="20" autocomplete="nickname" required>

        <label for="signup-email">Email</label>
        <input id="signup-email" name="email" type="email" autocomplete="email" required>

        <label for="signup-password">Mot de passe</label>
        <input id="signup-password" name="password" type="password" minlength="12" autocomplete="new-password" required>
        <p class="field-note">12 caracteres minimum, majuscule, minuscule, chiffre et symbole.</p>

        <label for="signup-confirm">Confirme le mot de passe</label>
        <input id="signup-confirm" name="confirm" type="password" minlength="12" autocomplete="new-password" required>

        <label class="accept-row">
          <input id="signup-accept" name="accept" type="checkbox" required>
          <span>J'accepte de creer un compte pour utiliser les points virtuels du casino.</span>
        </label>

        <button type="submit">Creer mon compte</button>
      </form>

      <p class="form-message" id="signup-message" role="status"></p>
      <p class="switch-link">Deja inscrit ? <a href="../login/login.html">Se connecter</a></p>
      <a class="back-link" href="../home/home.html">Retour aux jeux</a>
    </section>
    <aside class="auth-ad" data-ad-section hidden aria-label="Publicite">
      <span>PUBLICITE</span>
      <div class="ad-slot" data-ad-slot="responsive"></div>
      <button type="button" data-ad-settings>Regler les publicites</button>
    </aside>
  </main>

  <script src="../../shared/supabase/public-config.js?v=20260701-casino-rebuild1"></script>
  <script src="../../shared/supabase/data-service.js?v=20260701-casino-rebuild1"></script>
  <script src="../../shared/supabase/auth-session.js?v=20260701-casino-rebuild1"></script>
  <script src="signup-page.js?v=20260702-clicker1"></script>
</body>
</html>
