<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIP #TUFF | Connexion</title>
  <link rel="icon" type="image/png" href="../../assets/brand/rip-logo.png">
  <link rel="stylesheet" href="login.css?v=20260626-supabase-fix3">
</head>
<body>
  <header class="site-header">
    <a class="logo brand-logo" href="../home/home.html">
      <img src="../../assets/brand/rip-logo.png" alt="" aria-hidden="true">
      <span>RIP #TUFF</span>
    </a>
    <div class="header-actions" data-header-actions>
      <a class="header-login" href="../login/login.html" data-auth-visible="guest">Connexion</a>
      <a class="account-chip" href="../account/account-profile.html" data-header-account data-auth-visible="user" aria-label="Ouvrir mon profil">
        <span class="account-chip-avatar" data-header-avatar>?</span>
        <span class="account-chip-name" data-header-name>Compte</span>
      </a>
      <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Ouvrir le menu">Menu</button>
    </div>

            <nav class="nav" data-main-nav aria-label="Navigation principale">
      <a href="../home/home.html">Accueil</a>
      <a href="../chat/chat.html">Tchat</a>
      <a href="../dashboard/dashboard.html">Dashboard</a>
      <a href="../arcade/arcade.html">Arcade</a>
      <a href="../shop/shop.html">Boutique</a>
      <a href="../leaderboards/leaderboards.html">Classements</a>
      <a href="../achievements/achievements.html">Succes</a>
      <a href="../admin/admin.html" data-auth-visible="admin" hidden>Admin</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-panel" aria-labelledby="login-title">
      <p class="eyebrow">Connexion</p>
      <h1 id="login-title">Retour dans ton espace.</h1>
      <p class="auth-note">
        Connecte-toi avec ton compte Supabase. La session reste enregistree apres fermeture du site.
      </p>

      <form class="auth-form" id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="login-password">Mot de passe</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button class="button primary full" type="submit">Connexion</button>
        <p class="form-message" id="login-message" role="status" aria-live="polite"></p>
      </form>

      <p class="auth-switch">
        Pas encore de compte ?
        <a href="../signup/signup.html">Creer un compte</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <span>RIP</span>
    <span>&copy; <span id="year"></span> Tous droits reserves.</span>
  </footer>

  <script src="../../shared/supabase/public-config.js?v=20260626-supabase-fix3"></script>
  <script src="../../shared/supabase/data-service.js?v=20260626-supabase-fix3"></script>
  <script src="../../shared/supabase/auth-session.js?v=20260626-supabase-fix3"></script>
  <script src="login-page.js?v=20260626-supabase-fix3"></script>
</body>
</html>
